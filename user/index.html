<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RafatStay – حمّل التطبيق</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #C9A84C;
      --gold-light: #f0d07a;
      --gold-dark:  #8a6a1a;
      --cream:      #f5ede0;
      --cream-mid:  #e8e0cc;
      --dark:       #1a1400;
      --muted:      #6b6040;
      --navy:       #0d1a2b;
    }

    html, body {
      height: 100%;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: var(--navy);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Animated starfield background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,145,30,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 100%, rgba(100,80,10,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(120,90,10,0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Particles canvas ── */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      background: linear-gradient(160deg,
        rgba(250,244,228,0.96) 0%,
        rgba(238,228,200,0.94) 100%);
      border: 1px solid rgba(180,145,40,0.35);
      border-radius: 28px;
      padding: 52px 44px 44px;
      max-width: 420px;
      width: 92%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(160,130,40,0.1),
        0 0 60px rgba(180,140,20,0.25),
        0 40px 100px rgba(10,8,0,0.6),
        inset 0 1px 0 rgba(201,168,76,0.3);
      animation: fadeUp 0.8s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(36px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo area with flame glow ── */
    .logo-wrap {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 24px;
    }

    /* Flame / glow rings */
    .flame-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      animation: flameRing 2.2s ease-in-out infinite;
    }
    .flame-ring:nth-child(1) {
      background: radial-gradient(circle, rgba(255,190,30,0.55) 0%, transparent 70%);
      animation-delay: 0s;
      transform: scale(1.45);
    }
    .flame-ring:nth-child(2) {
      background: radial-gradient(circle, rgba(255,130,10,0.35) 0%, transparent 65%);
      animation-delay: 0.35s;
      transform: scale(1.25);
    }
    .flame-ring:nth-child(3) {
      background: radial-gradient(circle, rgba(255,220,80,0.2) 0%, transparent 55%);
      animation-delay: 0.7s;
      transform: scale(1.1);
    }

    @keyframes flameRing {
      0%   { opacity: 0.5; transform: scale(var(--s, 1.4)); }
      50%  { opacity: 1;   transform: scale(calc(var(--s, 1.4) * 1.08)); }
      100% { opacity: 0.5; transform: scale(var(--s, 1.4)); }
    }

    /* Sparkle dots around logo */
    .sparks {
      position: absolute;
      inset: -20px;
      pointer-events: none;
    }
    .spark {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold-light);
      animation: sparkFloat 2.8s ease-in-out infinite;
    }
    .spark:nth-child(1)  { top: 10%;  left: 50%; animation-delay: 0s;    }
    .spark:nth-child(2)  { top: 20%;  left: 80%; animation-delay: 0.4s;  }
    .spark:nth-child(3)  { top: 50%;  left: 95%; animation-delay: 0.8s;  }
    .spark:nth-child(4)  { top: 80%;  left: 80%; animation-delay: 1.2s;  }
    .spark:nth-child(5)  { top: 90%;  left: 50%; animation-delay: 0.2s;  }
    .spark:nth-child(6)  { top: 80%;  left: 20%; animation-delay: 0.6s;  }
    .spark:nth-child(7)  { top: 50%;  left: 5%;  animation-delay: 1.0s;  }
    .spark:nth-child(8)  { top: 20%;  left: 20%; animation-delay: 1.5s;  }

    @keyframes sparkFloat {
      0%   { opacity: 0;   transform: translateY(0) scale(0.5); }
      40%  { opacity: 1;   transform: translateY(-10px) scale(1.2); }
      100% { opacity: 0;   transform: translateY(-22px) scale(0); }
    }

    /* Logo image itself */
    .logo-img-wrap {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(145deg, #fff8e6, #f0d890);
      box-shadow:
        0 0 0 3px rgba(201,168,76,0.6),
        0 8px 30px rgba(180,130,10,0.45),
        inset 0 2px 4px rgba(255,255,255,0.5);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(201,168,76,0.6), 0 8px 30px rgba(180,130,10,0.4), inset 0 2px 4px rgba(255,255,255,0.5); }
      50%       { box-shadow: 0 0 0 4px rgba(240,200,80,0.9), 0 12px 50px rgba(220,160,10,0.7), inset 0 2px 4px rgba(255,255,255,0.5); }
    }

    .logo-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }

    /* ── Brand text ── */
    .brand-name {
      font-size: 1.9rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 50%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .brand-tagline {
      font-size: 0.82rem;
      color: #8a6a1a;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.65;
    }

    /* ── Spinner ── */
    .spinner-wrap { margin-bottom: 28px; }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(160,130,40,0.18);
      border-top-color: var(--gold);
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      font-size: 0.85rem;
      color: var(--gold-dark);
      font-weight: 700;
      margin-bottom: 24px;
      min-height: 1.4em;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid rgba(160,130,40,0.2);
      margin: 0 0 20px;
    }

    .manual-label {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Buttons ── */
    .manual-links { display: flex; flex-direction: column; gap: 11px; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 15px 22px;
      border-radius: 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.22s cubic-bezier(.16,1,.3,1);
      cursor: pointer;
      border: none;
      position: relative;
      overflow: hidden;
    }

    /* Android – Google Play */
    .btn-android {
      background: linear-gradient(135deg, rgba(201,168,76,0.15) 0%, rgba(201,168,76,0.08) 100%);
      border: 1.5px solid rgba(180,145,40,0.5);
      color: #6b4d00;
    }
    .btn-android:hover {
      background: linear-gradient(135deg, rgba(201,168,76,0.28) 0%, rgba(201,168,76,0.15) 100%);
      border-color: rgba(201,168,76,0.8);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(180,130,10,0.25);
    }
    .btn-android::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      border-radius: 14px;
    }

    /* iOS – App Store */
    .btn-ios {
      background: linear-gradient(135deg, rgba(26,20,0,0.08) 0%, rgba(26,20,0,0.04) 100%);
      border: 1.5px solid rgba(26,20,0,0.2);
      color: #2a1e00;
    }
    .btn-ios:hover {
      background: linear-gradient(135deg, rgba(26,20,0,0.14) 0%, rgba(26,20,0,0.08) 100%);
      border-color: rgba(26,20,0,0.35);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .btn-ios::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 60%);
      border-radius: 14px;
    }

    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .btn span { position: relative; z-index: 1; }

    /* Store badge subtitle */
    .btn-sub {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: right;
      position: relative;
      z-index: 1;
    }
    .btn-sub small {
      font-size: 0.68rem;
      font-weight: 400;
      opacity: 0.65;
      line-height: 1;
    }
    .btn-sub strong {
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.3;
    }

    /* ── Bottom note ── */
    .note {
      font-size: 0.72rem;
      color: #9a8450;
      margin-top: 18px;
      line-height: 1.5;
    }

    /* ── Hidden state for auto-redirect ── */
    .manual-section { transition: opacity 0.4s; }
  </style>
</head>

<!-- Particle animation -->
<script>
(function() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function rand(a, b) { return a + Math.random() * (b - a); }

  function spawnParticle() {
    particles.push({
      x:     rand(0, canvas.width),
      y:     rand(0, canvas.height),
      r:     rand(0.5, 2.2),
      alpha: 0,
      max:   rand(0.3, 0.8),
      speed: rand(0.003, 0.008),
      phase: Math.random() * Math.PI * 2,
      color: Math.random() > 0.5 ? '201,168,76' : '240,210,110',
    });
  }
  for (let i = 0; i < 90; i++) spawnParticle();

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.phase += p.speed;
      p.alpha = p.max * (0.5 + 0.5 * Math.sin(p.phase));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

      statusEl.textContent = "✔ تم اكتشاف Android – جاري فتح Google Play...";
