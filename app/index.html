<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RafatStay Partners – جاري التوجيه...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --dark: #f5ede0;
      --mid: #e8e7d0;
      --light: #1a1800;
      --muted: #6b6545;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--dark);
      color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(180,155,60,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 80%, rgba(180,155,60,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: linear-gradient(145deg, rgba(255,255,248,0.85), rgba(240,239,220,0.92));
      border: 1px solid rgba(160,130,50,0.3);
      border-radius: 24px;
      padding: 56px 48px 48px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(160,130,50,0.08),
        0 32px 80px rgba(100,90,50,0.15),
        inset 0 1px 0 rgba(201,168,76,0.2);
      animation: fadeUp 0.7s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-ring {
      width: 130px;
      height: 130px;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      position: relative;
      animation: pulse 2.4s ease-in-out infinite;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(180,130,20,0.25);
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(180,130,20,0.2); }
      50%       { box-shadow: 0 8px 40px rgba(180,130,20,0.45); }
    }

    .logo-ring img {
      width: 130px;
      height: 130px;
      border-radius: 28px;
      object-fit: cover;
    }

    h1 {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--light);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #6b6545;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .spinner-wrap {
      margin-bottom: 32px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(160,130,40,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 0.88rem;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 28px;
      min-height: 1.4em;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(160,130,40,0.2);
      margin: 0 0 24px;
    }

    .manual-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 20px;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.22s ease;
      cursor: pointer;
      border: none;
    }

    .btn-android {
      background: rgba(160,130,40,0.1);
      border: 1px solid rgba(160,130,40,0.35);
      color: #7a6010;
    }

    .btn-android:hover {
      background: rgba(160,130,40,0.18);
      border-color: rgba(160,130,40,0.55);
      transform: translateY(-1px);
    }

    .btn-web {
      background: rgba(30,25,0,0.06);
      border: 1px solid rgba(30,25,0,0.15);
      color: #2a2200;
    }

    .btn-web:hover {
      background: rgba(30,25,0,0.1);
      border-color: rgba(30,25,0,0.25);
      transform: translateY(-1px);
    }

    .btn-ios {
      background: rgba(30,25,0,0.06);
      border: 1px solid rgba(30,25,0,0.15);
      color: #2a2200;
      cursor: pointer;
      position: relative;
    }

    .btn-ios:hover {
      background: rgba(30,25,0,0.1);
      border-color: rgba(30,25,0,0.25);
      transform: translateY(-1px);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .note {
      font-size: 0.75rem;
      color: #6b6545;
      margin-top: 20px;
      line-height: 1.5;
    }
  </style>
</head>

</div>

<script>
  const GOOGLE_PLAY = "https://play.google.com/store/apps/details?id=com.RafatStayPartners.rafatstay_dashboard";
  const WEBSITE     = "https://partners.rafatstay.com/login";

  const statusEl = document.getElementById("status");

  function isAndroid() {
    return /android/i.test(navigator.userAgent);
  }

  function isIOS() {
    return /iphone|ipad|ipod/i.test(navigator.userAgent);
  }

  function isMobile() {
    return isAndroid() || isIOS() || /mobi|mobile/i.test(navigator.userAgent);
  }

  function redirect() {
    if (isAndroid()) {
      statusEl.textContent = "✔ تم اكتشاف Android – جاري فتح Google Play...";
      setTimeout(() => { window.location.href = GOOGLE_PLAY; }, 1200);
    } else if (isIOS()) {
      // Apple Store not available yet – send to website
      statusEl.textContent = "🍎 iOS مكتشف – App Store قريباً، جاري فتح بوابة الشركاء...";
      setTimeout(() => { window.location.href = WEBSITE; }, 1200);
    } else {
      // Desktop / other
      statusEl.textContent = "✔ تم اكتشاف كمبيوتر – جاري فتح بوابة الشركاء...";
      setTimeout(() => { window.location.href = WEBSITE; }, 1200);
    }
  }

  // Small delay so user sees the detection animation
  setTimeout(redirect, 800);
</script>
